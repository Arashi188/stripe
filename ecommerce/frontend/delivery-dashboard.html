<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Dashboard - GREAT WALL intl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="css/style.css" rel="stylesheet">
    <style>
        #map { height: 400px; border-radius: 12px; }
        .order-card { border-left: 4px solid #0d6efd; transition: all .2s; cursor: pointer; }
        .order-card:hover { background: #f8f9ff; }
        .order-card.delivered { border-left-color: #198754; opacity: .7; }
        .location-status { font-size: .8rem; }
        .location-status .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .location-status .dot.active { background: #198754; animation: pulse 1.5s infinite; }
        .location-status .dot.inactive { background: #6c757d; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: .4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light fixed-top bg-white" style="box-shadow:var(--shadow)">
    <div class="container">
        <a class="navbar-brand" href="index.html"><img src="images/logo.png" alt="GREAT WALL intl" height="36"></a>
        <div class="nav-icons d-flex align-items-center">
            <div class="nav-icons-group d-flex align-items-center">
                <span class="nav-icon-btn rounded-pill location-status" id="locationStatus">
                    <span class="dot inactive"></span>
                    <span id="locationText">Location off</span>
                </span>
                <div class="dropdown">
                    <a class="nav-icon-btn rounded-pill dropdown-toggle d-flex align-items-center" data-bs-toggle="dropdown">
                        <div class="user-avatar" id="userAvatar">?</div>
                        <i class="fas fa-chevron-down dropdown-arrow ms-1"></i>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="delivery-dashboard.html">Dashboard</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" id="logoutBtn">Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</nav>

<section class="dashboard-section" style="padding-top:100px;padding-bottom:40px">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1">Delivery Dashboard</h2>
                <p class="text-muted mb-0">Manage your deliveries and share live location</p>
            </div>
            <div>
                <button class="btn btn-outline-success" id="toggleLocationBtn"><i class="fas fa-location-arrow me-2"></i>Start Sharing Location</button>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 py-3">
                        <h5 class="fw-bold mb-0"><i class="fas fa-truck me-2"></i>My Orders</h5>
                    </div>
                    <div class="card-body" id="deliveryOrders">
                        <div class="loading-spinner"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 py-3">
                        <h5 class="fw-bold mb-0"><i class="fas fa-map-marked-alt me-2"></i>Live Map Preview</h5>
                    </div>
                    <div class="card-body p-2">
                        <div id="map"><div class="text-center text-muted py-5"><i class="fas fa-map fa-3x mb-2 d-block"></i>Select an order to view map</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>

<script>
var watchId = null;
var locationInterval = null;
var trackingActive = false;
var selectedOrderId = null;

function loadOrders() {
    api.delivery.getOrders().then(function(orders) {
        var container = document.getElementById('deliveryOrders');
        if (orders.length === 0) {
            container.innerHTML = '<div class="text-center text-muted py-4"><i class="fas fa-box-open fa-2x mb-2 d-block"></i><span>No orders assigned yet</span></div>';
            return;
        }
        container.innerHTML = orders.map(function(o) {
            var statusClass = o.status === 'DELIVERED' ? 'delivered' : '';
            return '<div class="order-card card border-0 bg-light mb-2 p-3 ' + statusClass + '" onclick="selectOrder(' + o.id + ', \'' + o.trackingId + '\')">' +
                '<div class="d-flex justify-content-between align-items-start">' +
                '<div><strong>Order #' + o.orderNumber + '</strong><br><small class="text-muted">' + o.user.fullName + ' - ' + o.shippingPhone + '</small></div>' +
                '<span class="badge bg-' + (o.status === 'DELIVERED' ? 'success' : o.status === 'SHIPPED' ? 'primary' : 'secondary') + '">' + o.status + '</span>' +
                '</div>' +
                '<small class="d-block mt-1">' + o.shippingAddress + ', ' + o.shippingCity + '</small>' +
                '<small class="text-muted">Tracking: ' + (o.trackingId || 'N/A') + '</small>' +
                '<div class="mt-2 d-flex gap-2">' +
                (o.status !== 'DELIVERED' ? '<button class="btn btn-success btn-sm" onclick="event.stopPropagation();markDelivered(' + o.id + ')"><i class="fas fa-check me-1"></i>Mark Delivered</button>' : '') +
                (o.trackingId ? '<a href="tracking.html?id=' + o.trackingId + '" class="btn btn-outline-primary btn-sm" onclick="event.stopPropagation()"><i class="fas fa-external-link-alt me-1"></i>Public View</a>' : '') +
                '</div></div>';
        }).join('');
    }).catch(function(err) {
        document.getElementById('deliveryOrders').innerHTML = '<div class="alert alert-danger">' + err.message + '</div>';
    });
}

function selectOrder(orderId, trackingId) {
    selectedOrderId = orderId;
    var mapEl = document.getElementById('map');
    mapEl.innerHTML = '<div class="text-center py-5"><div class="spinner"></div><p class="mt-2">Loading location...</p></div>';
    api.delivery.getLocation(orderId).then(function(loc) {
        if (loc.latitude && loc.longitude) {
            var iframe = '<iframe width="100%" height="400" style="border:0;border-radius:12px" loading="lazy" ' +
                'src="https://www.openstreetmap.org/export/embed.html?bbox=' + (loc.longitude - 0.01) + ',' + (loc.latitude - 0.01) + ',' + (loc.longitude + 0.01) + ',' + (loc.latitude + 0.01) + '&layer=mapnik&marker=' + loc.latitude + ',' + loc.longitude + '">' +
                '</iframe>';
            mapEl.innerHTML = iframe + '<div class="mt-2 small text-muted">Last updated: ' + new Date(loc.timestamp).toLocaleString() + '</div>';
        } else {
            mapEl.innerHTML = '<div class="text-center text-muted py-5"><i class="fas fa-map-marker-alt fa-3x mb-2 d-block"></i><span>No location data yet</span></div>';
        }
    }).catch(function() {
        mapEl.innerHTML = '<div class="alert alert-danger">Failed to load location</div>';
    });
}

function markDelivered(orderId) {
    api.delivery.updateOrderStatus(orderId, 'DELIVERED').then(function() {
        loadOrders();
        if (typeof cartManager !== 'undefined' && cartManager.showToast) {
            cartManager.showToast('Order marked as delivered!', 'success');
        }
    }).catch(function(err) {
        if (typeof cartManager !== 'undefined' && cartManager.showToast) {
            cartManager.showToast(err.message, 'error');
        }
    });
}

function startLocationSharing() {
    if (!navigator.geolocation) {
        alert('Geolocation is not supported by your browser');
        return;
    }

    trackingActive = !trackingActive;
    var btn = document.getElementById('toggleLocationBtn');

    if (trackingActive) {
        if (!selectedOrderId) {
            cartManager.showToast('Select an order first before sharing location', 'warning');
            trackingActive = false;
            return;
        }

        btn.innerHTML = '<i class="fas fa-stop me-2"></i>Stop Sharing';
        btn.className = 'btn btn-outline-danger';

        cartManager.showToast('Sharing live location...', 'success');

        watchId = navigator.geolocation.watchPosition(function(pos) {
            var lat = pos.coords.latitude;
            var lng = pos.coords.longitude;
            document.getElementById('locationText').textContent = 'Location active';
            document.querySelector('.location-status .dot').className = 'dot active';

            if (selectedOrderId) {
                api.delivery.updateLocation(selectedOrderId, lat, lng).catch(function() {});
            }
        }, function(err) {
            console.warn('Geolocation error:', err.message);
            document.getElementById('locationText').textContent = 'Location error';
            document.querySelector('.location-status .dot').className = 'dot inactive';
            cartManager.showToast('GPS error: ' + err.message, 'error');
        }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 });

        locationInterval = setInterval(function() {
            if (selectedOrderId && navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(pos) {
                    api.delivery.updateLocation(selectedOrderId, pos.coords.latitude, pos.coords.longitude).catch(function() {});
                }, function() {}, { enableHighAccuracy: true, timeout: 5000 });
            }
        }, 15000);
    } else {
        btn.innerHTML = '<i class="fas fa-location-arrow me-2"></i>Start Sharing Location';
        btn.className = 'btn btn-outline-success';
        document.getElementById('locationText').textContent = 'Location off';
        document.querySelector('.location-status .dot').className = 'dot inactive';
        if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
        if (locationInterval) { clearInterval(locationInterval); locationInterval = null; }
        cartManager.showToast('Location sharing stopped', 'info');
    }
}

document.getElementById('toggleLocationBtn').addEventListener('click', startLocationSharing);

document.addEventListener('DOMContentLoaded', function() {
    auth.redirectIfNotLoggedIn();
    var user = auth.getUser();
    if (user && user.role !== 'DELIVERY_MAN' && user.role !== 'ADMIN') {
        window.location.href = 'index.html';
        return;
    }
    loadOrders();
    setInterval(loadOrders, 30000);
});
</script>
</body>
</html>
