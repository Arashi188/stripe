<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - ShopPremium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light fixed-top bg-white" style="box-shadow:var(--shadow)">
    <div class="container">
        <a class="navbar-brand" href="index.html">Shop<span>Premium</span></a>
        <div class="nav-icons d-flex align-items-center gap-2">
            <a href="cart.html" class="btn"><i class="fas fa-shopping-bag"></i><span class="cart-count">0</span></a>
        </div>
    </div>
</nav>

<section class="checkout-section py-5">
    <div class="container">
        <div class="text-center mb-5">
            <h2 class="fw-bold">Checkout</h2>
            <p class="text-muted">Complete your order with secure payment</p>
        </div>
        <div id="checkoutContent">
            <div class="row g-5">
                <div class="col-lg-7">
                    <div class="card border-0 shadow-sm p-4">
                        <h4 class="fw-bold mb-4">Shipping Information</h4>
                        <form id="checkoutForm">
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="shippingName" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Address</label>
                                    <input type="text" class="form-control" id="shippingAddress" placeholder="Street address" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">City</label>
                                    <input type="text" class="form-control" id="shippingCity" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">State</label>
                                    <input type="text" class="form-control" id="shippingState" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">ZIP Code</label>
                                    <input type="text" class="form-control" id="shippingZip" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Country</label>
                                    <input type="text" class="form-control" id="shippingCountry" value="United States" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Phone</label>
                                    <input type="tel" class="form-control" id="shippingPhone">
                                </div>
                            </div>
                            <hr class="my-4">
                            <h4 class="fw-bold mb-4">Payment</h4>
                            <p class="text-muted small">Your payment will be processed securely via Stripe.</p>
                            <div id="cardElement" class="p-3 border rounded mb-3">
                                <p class="text-muted mb-0"><i class="fas fa-lock me-2"></i>Secure payment processing</p>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">
                                <i class="fas fa-lock me-2"></i>Place Order & Pay
                            </button>
                        </form>
                    </div>
                </div>
                <div class="col-lg-5">
                    <div class="cart-summary">
                        <h5>Order Summary</h5>
                        <div id="checkoutItems"></div>
                        <hr>
                        <div class="summary-row"><span>Subtotal</span><span id="checkoutSubtotal">₦0.00</span></div>
                        <div class="summary-row"><span>Shipping</span><span id="checkoutShipping">₦0.00</span></div>
                        <div class="summary-row"><span>Tax</span><span id="checkoutTax">₦0.00</span></div>
                        <div class="summary-total d-flex justify-content-between">
                            <span>Total</span>
                            <span id="checkoutTotal">₦0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://js.stripe.com/v3/"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>
</body>
</html>
