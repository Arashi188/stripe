<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secretary Dashboard - GREAT WALL intl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .notif-bell { position: relative; cursor: pointer; }
        .notif-bell .badge { position: absolute; top: -5px; right: -8px; font-size: .65rem; }
        .notif-dropdown { max-height: 400px; overflow-y: auto; width: 350px; }
        .notif-item { padding: .75rem 1rem; border-bottom: 1px solid #eee; transition: background .15s; }
        .notif-item:hover { background: #f8f9fa; }
        .notif-item.urgent { background: #fff3cd; }
        .notif-item.urgent:hover { background: #ffe69c; }
        .notif-time { font-size: .75rem; color: #6c757d; }
        .transfer-card { border-left: 4px solid #ffc107; }
        .transfer-card.approved { border-left-color: #198754; }
        .scan-panel { margin-top: .75rem; padding: .75rem; background: #fff; border-radius: 8px; border: 1px solid #e9ecef; }
        .scan-panel .scan-badge { font-size: .75rem; padding: .25rem .6rem; border-radius: 20px; }
        .scan-panel .scan-table { font-size: .8rem; width: 100%; margin-top: .5rem; }
        .scan-panel .scan-table td { padding: .2rem .5rem; }
        .scan-panel .scan-table td:first-child { color: #6c757d; white-space: nowrap; }
        .scan-panel .extracted-text { font-size: .78rem; color: #495057; background: #f5f6f8; padding: .5rem; border-radius: 4px; font-family: monospace; white-space: pre-wrap; word-break: break-word; max-height: 80px; overflow-y: auto; margin-top: .4rem; }
        .scan-panel .scan-warning { font-size: .8rem; padding: .4rem .6rem; border-radius: 4px; margin-top: .4rem; }
        @media (max-width: 575.98px) { .notif-panel { left: 10px !important; right: 10px !important; width: auto !important; } }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light fixed-top bg-white" style="box-shadow:var(--shadow)">
    <div class="container">
        <a class="navbar-brand" href="index.html"><img src="images/logo.png" alt="GREAT WALL intl" height="36"></a>
        <div class="nav-icons d-flex align-items-center">
            <div class="nav-icons-group d-flex align-items-center">
                <div class="notif-bell nav-icon-btn rounded-pill" id="notifBell">
                    <i class="fas fa-bell"></i>
                    <span class="badge bg-danger rounded-pill d-none" id="notifCount">0</span>
                </div>
                <div class="dropdown">
                    <a class="nav-icon-btn rounded-pill dropdown-toggle d-flex align-items-center" data-bs-toggle="dropdown">
                        <div class="user-avatar" id="userAvatar">?</div>
                        <i class="fas fa-chevron-down dropdown-arrow ms-1"></i>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="secretary-dashboard.html">Dashboard</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" id="logoutBtn">Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- Notification Panel -->
<div class="notif-panel" id="notifPanel" style="display:none;position:fixed;top:70px;right:20px;z-index:9999;background:white;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.15);max-height:500px;overflow-y:auto;">
    <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
        <h6 class="fw-bold mb-0">Notifications</h6>
        <button class="btn btn-sm btn-outline-secondary" id="markAllRead">Mark all read</button>
    </div>
    <div id="notifList"></div>
</div>

<section class="dashboard-section" style="padding-top:100px;padding-bottom:40px">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1">Secretary Dashboard</h2>
                <p class="text-muted mb-0">Manage transfer payments and assign deliveries</p>
            </div>
            <div class="d-flex gap-2">
                <span class="badge bg-warning text-dark rounded-pill px-3 py-2" id="pendingBadge">0 Pending</span>
                <span class="badge bg-success rounded-pill px-3 py-2" id="approvedTodayBadge">0 Today</span>
            </div>
        </div>

        <!-- Pending Transfer Approvals -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-header bg-white border-0 py-3">
                <h5 class="fw-bold mb-0"><i class="fas fa-clock text-warning me-2"></i>Pending Transfer Approvals</h5>
            </div>
            <div class="card-body" id="pendingTransfers">
                <div class="loading-spinner"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- Recent Orders -->
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
                <h5 class="fw-bold mb-0"><i class="fas fa-shopping-bag me-2"></i>Recent Orders</h5>
            </div>
            <div class="card-body" id="recentOrdersList">
                <div class="loading-spinner"><div class="spinner"></div></div>
            </div>
        </div>
    </div>
</section>

<!-- Assign Delivery Modal -->
<div class="modal fade" id="assignModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Assign Delivery Man</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Assign delivery for Order #<span id="assignOrderNumber"></span></p>
                <select class="form-select" id="deliveryManSelect">
                    <option value="">Select delivery man...</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" id="assignConfirmBtn">Assign</button>
            </div>
        </div>
    </div>
</div>

<!-- Receipt Preview Modal -->
<div class="modal fade" id="receiptModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-receipt me-2"></i>Payment Receipt</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center" id="receiptModalBody">
                <div class="loading-spinner"><div class="spinner"></div></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>

<script>
var assignOrderId = null;

function loadDashboard() {
    api.secretary.getDashboard().then(function(data) {
        document.getElementById('pendingBadge').textContent = data.pendingCount + ' Pending';
        document.getElementById('approvedTodayBadge').textContent = data.approvedToday + ' Today';

        var pendingHtml;
        if (data.pendingTransfers.length === 0) {
            pendingHtml = '<div class="text-center text-muted py-4"><i class="fas fa-check-circle fa-2x mb-2 d-block text-success"></i><span>No pending transfers</span></div>';
        } else {
            pendingHtml = data.pendingTransfers.map(function(o) {
                return '<div class="transfer-card card border-0 bg-light mb-2 p-3">' +
                    '<div class="d-flex justify-content-between align-items-start">' +
                    '<div><strong>Order #' + o.orderNumber + '</strong><br><small class="text-muted">' + o.user.fullName + ' - ' + o.user.email + '</small></div>' +
                    '<span class="badge bg-warning text-dark">₦' + o.totalAmount.toFixed(2) + '</span>' +
                    '</div>' +
                    '<div class="mt-2 d-flex gap-2">' +
                    '<button class="btn btn-success btn-sm" onclick="approvePayment(' + o.id + ')"><i class="fas fa-check me-1"></i>Approve</button>' +
                    '<button class="btn btn-outline-primary btn-sm" onclick="openAssignModal(' + o.id + ',\'' + o.orderNumber + '\')"><i class="fas fa-truck me-1"></i>Assign & Approve</button>' +
                    '<button class="btn btn-outline-info btn-sm" onclick="viewReceipt(' + o.id + ')"><i class="fas fa-receipt me-1"></i>Receipt</button>' +
                    '</div>' +
                    '<div class="scan-panel" id="scanPanel-' + o.id + '" style="display:none"><div class="loading-spinner"><div class="spinner"></div></div></div>' +
                    '</div>';
            }).join('');
        }
        document.getElementById('pendingTransfers').innerHTML = pendingHtml;

        data.pendingTransfers.forEach(function(o) {
            if (o.receiptUrl) {
                loadScanResults(o.id);
            }
        });

        var recentHtml;
        if (data.recentOrders.length === 0) {
            recentHtml = '<div class="text-center text-muted py-4"><span>No orders yet</span></div>';
        } else {
            recentHtml = '<div class="table-responsive"><table class="table table-hover"><thead><tr><th>Order</th><th>Customer</th><th>Amount</th><th>Payment</th><th>Status</th><th>Tracking</th><th>Action</th></tr></thead><tbody>' +
                data.recentOrders.map(function(o) {
                    return '<tr>' +
                        '<td><strong>#' + o.orderNumber + '</strong></td>' +
                        '<td>' + o.user.fullName + '</td>' +
                        '<td>₦' + o.totalAmount.toFixed(2) + '</td>' +
                        '<td><span class="badge bg-' + (o.paymentMethod === 'transfer' ? 'info' : 'secondary') + '">' + o.paymentMethod + '</span> ' +
                        '<span class="badge bg-' + (o.paymentStatus === 'PAID' ? 'success' : 'warning') + '">' + o.paymentStatus + '</span></td>' +
                        '<td><span class="badge bg-' + (o.status === 'DELIVERED' ? 'success' : o.status === 'SHIPPED' ? 'primary' : 'secondary') + '">' + o.status + '</span></td>' +
                        '<td>' + (o.trackingId ? '<span class="tracking-badge">' + o.trackingId + '</span>' : '-') + '</td>' +
                        '<td>' + (o.trackingId ? '<a href="tracking.html?id=' + o.trackingId + '" class="btn btn-sm btn-outline-primary"><i class="fas fa-map"></i></a>' : '') + '</td>' +
                        '</tr>';
                }).join('') +
                '</tbody></table></div>';
        }
        document.getElementById('recentOrdersList').innerHTML = recentHtml;
    }).catch(function(err) {
        document.getElementById('pendingTransfers').innerHTML = '<div class="alert alert-danger">' + err.message + '</div>';
        document.getElementById('recentOrdersList').innerHTML = '';
    });
}

function approvePayment(orderId) {
    api.secretary.approvePayment(orderId).then(function() {
        loadDashboard();
        if (typeof cartManager !== 'undefined' && cartManager.showToast) {
            cartManager.showToast('Payment approved! Tracking ID generated.', 'success');
        }
    }).catch(function(err) {
        if (typeof cartManager !== 'undefined' && cartManager.showToast) {
            cartManager.showToast(err.message, 'error');
        }
    });
}

function viewReceipt(orderId) {
    var body = document.getElementById('receiptModalBody');
    body.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
    var modal = new bootstrap.Modal(document.getElementById('receiptModal'));
    modal.show();

    api.getOrderReceipt(orderId).then(function(response) {
        if (!response.ok) {
            return response.json().then(function(err) { throw new Error(err.error || 'Receipt not available'); });
        }
        var contentType = response.headers.get('content-type') || '';
        if (contentType.includes('application/pdf')) {
            response.blob().then(function(blob) {
                var url = URL.createObjectURL(blob);
                body.innerHTML = '<embed src="' + url + '" type="application/pdf" width="100%" height="600px" style="border:none">' +
                    '<div class="mt-3"><a href="' + url + '" download="receipt.pdf" class="btn btn-primary"><i class="fas fa-download me-1"></i>Download PDF</a></div>';
            });
        } else {
            response.blob().then(function(blob) {
                var url = URL.createObjectURL(blob);
                body.innerHTML = '<img src="' + url + '" class="img-fluid" style="max-height:500px;object-fit:contain" onerror="this.onerror=null;this.src=\'/images/no-image.svg\'">' +
                    '<div class="mt-3"><a href="' + url + '" download="receipt.png" class="btn btn-primary"><i class="fas fa-download me-1"></i>Download</a></div>';
            });
        }
    }).catch(function(err) {
        body.innerHTML = '<div class="alert alert-danger mb-0">' + err.message + '</div>';
    });
}

function loadScanResults(orderId) {
    var panel = document.getElementById('scanPanel-' + orderId);
    if (!panel) return;
    panel.style.display = 'block';

    api.getScanResults(orderId).then(function(data) {
        var status = data.receipt_scan_status;
        var details = data.receipt_scan_details;

        var statusClass = 'bg-secondary';
        var statusLabel = 'No Scan';
        if (status === 'VALID') { statusClass = 'bg-success'; statusLabel = 'Valid'; }
        else if (status === 'INVALID') { statusClass = 'bg-danger'; statusLabel = 'Invalid'; }
        else if (status === 'NEEDS_REVIEW') { statusClass = 'bg-warning text-dark'; statusLabel = 'Needs Review'; }

        var amountIcon = details && details.amount_check === 'PASS' ? '✅' : details && details.amount_check === 'FAIL' ? '❌' : '⚠️';
        var amountLabel = details ? details.amount_check : 'Unknown';
        var statusIcon = details && details.status_check === 'PASS' ? '✅' : details && details.status_check === 'FAIL' ? '❌' : '⚠️';
        var statusLabel2 = details ? details.status_check : 'Unknown';
        var bankIcon = details && details.bank_check === 'FOUND' ? '✅' : '⚠️';
        var bankLabel = details ? details.bank_check : 'Not Found';
        var dateIcon = details && details.date_check === 'RECENT' ? '✅' : '⚠️';
        var dateLabel = details ? details.date_check : 'Not Found';

        var warningHtml = '';
        if (status === 'INVALID') {
            var failed = [];
            if (details && details.amount_check === 'FAIL') failed.push('Amount');
            if (details && details.status_check === 'FAIL') failed.push('Transfer Status');
            warningHtml = '<div class="scan-warning bg-danger bg-opacity-10 text-danger border border-danger">⚠️ Automatic scan flagged this receipt as invalid. Failed checks: ' + failed.join(', ') + '. Review the receipt carefully before approving.</div>';
        } else if (status === 'NEEDS_REVIEW') {
            warningHtml = '<div class="scan-warning bg-warning bg-opacity-10 text-warning-emphasis border border-warning">⚠️ Some checks could not be completed automatically. Please view the receipt manually before approving.</div>';
        }

        var extractedHtml = details && details.extracted_text
            ? '<div class="mt-2"><small class="text-muted fw-semibold">What the scanner read:</small><div class="extracted-text">' + escapeHtml(details.extracted_text.substring(0, 200)) + '</div></div>'
            : '';

        panel.innerHTML =
            '<div class="d-flex align-items-center gap-2 mb-1"><small class="fw-semibold text-muted">Scan Results</small><span class="scan-badge ' + statusClass + '">' + statusLabel + '</span></div>' +
            '<table class="scan-table">' +
            '<tr><td>Amount Check</td><td>' + amountIcon + ' ' + amountLabel + '</td></tr>' +
            '<tr><td>Transfer Status</td><td>' + statusIcon + ' ' + statusLabel2 + '</td></tr>' +
            '<tr><td>Bank Name</td><td>' + bankIcon + ' ' + bankLabel + '</td></tr>' +
            '<tr><td>Date</td><td>' + dateIcon + ' ' + dateLabel + '</td></tr>' +
            '</table>' +
            warningHtml +
            extractedHtml;
    }).catch(function() {
        panel.style.display = 'none';
    });
}

function openAssignModal(orderId, orderNumber) {
    assignOrderId = orderId;
    document.getElementById('assignOrderNumber').textContent = orderNumber;
    var select = document.getElementById('deliveryManSelect');
    select.innerHTML = '<option value="">Loading...</option>';
    api.secretary.getDeliveryMen().then(function(men) {
        select.innerHTML = '<option value="">Select delivery man...</option>' +
            men.map(function(m) { return '<option value="' + m.id + '">' + m.fullName + ' (' + m.phone + ')</option>'; }).join('');
    }).catch(function() {
        select.innerHTML = '<option value="">Failed to load</option>';
    });
    new bootstrap.Modal(document.getElementById('assignModal')).show();
}

document.getElementById('assignConfirmBtn').addEventListener('click', function() {
    var deliveryManId = document.getElementById('deliveryManSelect').value;
    if (!deliveryManId) { alert('Please select a delivery man'); return; }
    api.secretary.assignDelivery(assignOrderId, parseInt(deliveryManId)).then(function() {
        bootstrap.Modal.getInstance(document.getElementById('assignModal')).hide();
        loadDashboard();
        if (typeof cartManager !== 'undefined' && cartManager.showToast) {
            cartManager.showToast('Delivery assigned!', 'success');
        }
    }).catch(function(err) {
        if (typeof cartManager !== 'undefined' && cartManager.showToast) {
            cartManager.showToast(err.message, 'error');
        }
    });
});

// Notifications
function playUrgentSound() {
    try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        osc.type = 'square';
        gain.gain.value = 0.3;
        osc.start();
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.setValueAtTime(0, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.3, ctx.currentTime + 0.25);
        gain.gain.setValueAtTime(0, ctx.currentTime + 0.4);
        gain.gain.setValueAtTime(0.3, ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(0, ctx.currentTime + 0.65);
        osc.stop(ctx.currentTime + 0.7);
    } catch(e) { /* audio not supported */ }
}

function loadNotifications() {
    api.secretary.getNotifications().then(function(notifs) {
        var count = notifs.length;
        var countEl = document.getElementById('notifCount');
        if (count > 0) {
            countEl.textContent = count;
            countEl.classList.remove('d-none');
            if (notifs.some(function(n) { return n.isUrgent; })) {
                playUrgentSound();
            }
        } else {
            countEl.classList.add('d-none');
        }

        var list = document.getElementById('notifList');
        if (notifs.length === 0) {
            list.innerHTML = '<div class="text-center text-muted py-4"><small>No new notifications</small></div>';
        } else {
            list.innerHTML = notifs.map(function(n) {
                return '<div class="notif-item' + (n.isUrgent ? ' urgent' : '') + '" data-id="' + n.id + '" data-order-id="' + (n.orderId || '') + '" style="cursor:pointer" onclick="handleNotifClick(' + (n.id) + ',' + (n.orderId || 'null') + ', this)">' +
                    '<div class="d-flex justify-content-between">' +
                    '<small class="fw-bold">' + (n.isUrgent ? '<i class="fas fa-exclamation-circle text-danger me-1"></i>' : '') + 'Order Update</small>' +
                    '<button class="btn btn-sm btn-link text-muted p-0" onclick="event.stopPropagation();markRead(' + n.id + ')"><i class="fas fa-times"></i></button>' +
                    '</div>' +
                    '<p class="mb-0 small">' + n.message + '</p>' +
                    '<div class="notif-time">' + new Date(n.createdAt).toLocaleString() + '</div>' +
                    '</div>';
            }).join('');
        }
    }).catch(function() {});
}

function markRead(id) {
    api.secretary.markNotificationRead(id).then(loadNotifications);
}

function handleNotifClick(notifId, orderId, el) {
    markRead(notifId);
    document.getElementById('notifPanel').style.display = 'none';
    if (orderId) {
        // Try to open assign modal for this order
        api.secretary.getDashboard().then(function(data) {
            var order = data.pendingTransfers.find(function(o) { return o.id === orderId; });
            if (order) {
                openAssignModal(order.id, order.orderNumber);
            } else {
                // Order already processed or not pending
                window.location.reload();
            }
        }).catch(function() {
            window.location.reload();
        });
    }
}

document.getElementById('markAllRead').addEventListener('click', function() {
    api.secretary.markAllRead().then(loadNotifications);
});

document.getElementById('notifBell').addEventListener('click', function(e) {
    e.stopPropagation();
    var panel = document.getElementById('notifPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
});

document.addEventListener('click', function() {
    document.getElementById('notifPanel').style.display = 'none';
});

document.addEventListener('DOMContentLoaded', function() {
    auth.redirectIfNotLoggedIn();
    var user = auth.getUser();
    if (user && user.role !== 'SECRETARY' && user.role !== 'ADMIN') {
        window.location.href = 'index.html';
        return;
    }
    loadDashboard();
    loadNotifications();
    setInterval(loadNotifications, 30000);
});
</script>
</body>
</html>
